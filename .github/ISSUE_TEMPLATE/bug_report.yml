name: Bug report
description: Report an issue in Jorm
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Example: CLI 0.1.1, jorm-spring-boot-starter 0.1.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: Example: Windows 11, macOS, Ubuntu
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps, ideally with a minimal example
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs/stack trace
      description: Include relevant logs. Remove secrets, tokens, and passwords.
      render: shell
