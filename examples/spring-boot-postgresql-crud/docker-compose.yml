services:
  postgres:
    image: postgres:16
    container_name: jorm-example-postgres
    environment:
      POSTGRES_DB: jorm_example
      POSTGRES_USER: jorm
      POSTGRES_PASSWORD: jorm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jorm -d jorm_example"]
      interval: 2s
      timeout: 5s
      retries: 15
